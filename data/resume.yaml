bio: >
  Senior Research & Development Engineer working on computational geometry,
  geometry processing, and meshing algorithms for simulation and CAD software
  at Synopsys (formerly Ansys). PhD from ETH Zurich. Interdisciplinary background
  across engineering, computer science, architecture, and design, with work and
  life experience in Sweden, Switzerland, Germany, and Taiwan.


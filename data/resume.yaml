    url: "https://www.synopsys.com"
    roles:
      - period: "Jan 2026–Present"
        role: Senior Research & Development Engineer
        description: >
          Continuing in the same role following the Ansys–Synopsys merger. Research
          and build core geometric algorithms for CAD kernels and mesh generation.
          Formulate complex computational geometry problems and deliver foundational
          algorithmic solutions that improve robustness, performance, and accuracy
          across simulation workflows.
      - period: "Jul 2025–Jan 2026"
        role: Research & Development Engineer II
  - period: "Jan 2023–Jul 2025"
    role: Research & Development Engineer II
    org: Ansys, Stockholm, Sweden · Remote
    url: "https://www.ansys.com"
    description: >
      Researched, designed, and implemented geometric and meshing algorithms
      for CAD and simulation pipelines. Shaped problem formulations and developed
      foundational components that strengthened the Mesh Development Unit's
      geometric capabilities.

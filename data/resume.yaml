bio: |
  I am a Senior Research & Development Engineer working on computational geometry,
  geometry processing, and meshing algorithms for simulation and CAD software at
  Synopsys (formerly Ansys).

  I focus on rigorously formulating problems and translating theory into robust,
  production-quality software. I hold a Doctor of Sciences from ETH Zurich and have
  an interdisciplinary background across engineering, computer science, architecture,
  and design, with work and life experience in Sweden, Switzerland, Germany, and Taiwan.

experience:

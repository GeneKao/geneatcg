baseURL = 'https://www.geneatcg.com'
languageCode = 'en-US'
title = 'GENEATCG'
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true
ignoreFiles = ['content/404\\.html', '\\.lr$']

[params]
  defaultTheme = 'light'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = false
  description = "Gene Ting-Chun Kao — Computational Geometry, Geometry Processing, Research"
  author = "Gene Ting-Chun Kao"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/GeneKao"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/kaogene"

[menu]
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 10
  [[menu.main]]
    name = "Portfolio"
    url = "/portfolio/"
    weight = 20
  [[menu.main]]
    name = "Resume"
    url = "/resume/"
    weight = 30
  [[menu.main]]
    name = "Publications"
    url = "/publications/"
    weight = 40
  [[menu.main]]
    name = "Talks"
    url = "/talks/"
    weight = 50
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 60
  [[menu.main]]
    identifier = "search"
    pre = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-0.15em"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'
    name = ""
    url = "/search/"
    weight = 70

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true

      - name: Build site
        run: hugo --minify

      - name: Copy CNAME
        run: cp CNAME public/

      - name: Deploy to genekao.github.io
        run: |
          cd public
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy: ${{ github.sha }}"
          git push --force \
            "https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/GeneKao/genekao.github.io.git" \
            HEAD:main
